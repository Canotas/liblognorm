name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build and Test (gcc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libjson-c-dev \
            libfastjson-dev \
            libestr-dev \
            libxml2-dev \
            valgrind \
            clang

      - name: Bootstrap build system
        run: autoreconf -fi

      - name: Configure
        run: ./configure --enable-testbench

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-gcc
          path: |
            tests/*.log
            tests/testsuite.log

  asan-ubsan:
    name: Build and Test (clang ASan/UBSan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libjson-c-dev \
            libfastjson-dev \
            libestr-dev \
            libxml2-dev \
            clang

      - name: Bootstrap build system
        run: autoreconf -fi

      - name: Configure with ASan/UBSan
        env:
          CC: clang
          CFLAGS: "-fsanitize=address,undefined -g -O1"
          LDFLAGS: "-fsanitize=address,undefined"
        run: ./configure --enable-testbench

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        env:
          ASAN_OPTIONS: "abort_on_error=1:detect_leaks=1"
          UBSAN_OPTIONS: "abort_on_error=1:print_stacktrace=1"
        run: make check

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-asan
          path: |
            tests/*.log
            tests/testsuite.log
